<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --brand: #c0536a;
  --ink: #111014;
  --ink2: #2a2630;
  --white: #ffffff;
  --off: #f7f5f2;
  --pale: #eeeae6;
  --muted: #9a9096;
  --accent: #c0536a;
  --warm: #f5ede8;
  --radius: 4px;
  --radius-lg: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--white);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 100px;
  overflow-x: hidden;
}

/* ══════════════════════════
   TOP BAR
══════════════════════════ */
.top-bar {
  background: var(--ink);
  padding: 9px 20px;
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
}
.top-bar span { color: var(--accent); }

/* ══════════════════════════
   HEADER
══════════════════════════ */
.shop-header {
  position: sticky; top: 0; z-index: 200;
  background: var(--white);
  border-bottom: 2px solid var(--ink);
  height: 62px;
  display: flex; align-items: center;
}
.header-inner {
  max-width: 720px; margin: 0 auto; width: 100%;
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  color: var(--ink);
  letter-spacing: 2px;
  line-height: 1;
}
.header-logo-sub {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: -2px;
  display: block;
}
.header-right { display: flex; align-items: center; gap: 8px; }

.lang-btn {
  background: none;
  border: 1.5px solid var(--pale);
  border-radius: var(--radius);
  padding: 5px 10px;
  font-size: 11px; font-weight: 700;
  color: var(--muted);
  cursor: pointer; font-family: inherit;
  letter-spacing: 0.5px;
  transition: all 0.15s;
}
.lang-btn:hover { border-color: var(--ink); color: var(--ink); }

.cart-btn {
  display: flex; align-items: center; gap: 8px;
  background: var(--accent);
  border: none;
  padding: 9px 18px;
  font-family: inherit; font-size: 11px; font-weight: 700;
  color: white; cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px; text-transform: uppercase;
}
.cart-btn:active { opacity: 0.85; }
.cart-count {
  background: white; color: var(--accent);
  border-radius: 50%;
  width: 17px; height: 17px;
  font-size: 10px; font-weight: 700;
  display: none; align-items: center; justify-content: center;
}
.cart-count.has-items { display: flex; }

/* ══════════════════════════
   HERO — FULL BLEED EDITORIAL
══════════════════════════ */
.hero {
  background: var(--off);
  padding: 0;
  position: relative;
  overflow: hidden;
  border-bottom: 2px solid var(--ink);
}
.hero-inner {
  max-width: 720px; margin: 0 auto;
  padding: 36px 20px 32px;
  display: flex; flex-direction: column;
  position: relative; z-index: 1;
}
.hero-kicker {
  font-size: 9px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.hero-kicker::after { content: ''; flex: 1; height: 1px; background: var(--accent); max-width: 40px; opacity: 0.4; }
.hero-headline {
  font-family: 'DM Serif Display', serif;
  font-size: 52px;
  line-height: 0.95;
  color: var(--ink);
  margin-bottom: 16px;
  letter-spacing: -1px;
}
.hero-headline em {
  font-style: italic;
  color: var(--accent);
}
.hero-row {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  flex-wrap: wrap;
}
.hero-sub {
  font-size: 12px; color: var(--muted);
  font-weight: 400; letter-spacing: 0.2px;
  line-height: 1.6;
  max-width: 220px;
}
.hero-stats {
  display: flex; gap: 20px;
}
.hero-stat { text-align: right; }
.hero-stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; color: var(--ink);
  letter-spacing: 1px; line-height: 1;
}
.hero-stat-label {
  font-size: 8px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin-top: 2px;
}

/* Decorative big text behind */
.hero-bg-text {
  position: absolute;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 130px;
  color: rgba(0,0,0,0.04);
  bottom: -20px; right: -10px;
  letter-spacing: 4px;
  pointer-events: none;
  line-height: 1;
}

/* ══════════════════════════
   FILTER BAR
══════════════════════════ */
.filter-bar {
  border-bottom: 1px solid var(--pale);
  background: var(--white);
  position: sticky; top: 62px; z-index: 100;
}
.filter-bar-inner {
  max-width: 720px; margin: 0 auto;
  padding: 0 20px;
  display: flex; align-items: center; gap: 0;
  overflow-x: auto; scrollbar-width: none;
}
.filter-bar-inner::-webkit-scrollbar { display: none; }
.filter-tab {
  padding: 14px 18px;
  font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted);
  cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: inherit;
  flex-shrink: 0;
}
.filter-tab.active { color: var(--ink); border-bottom-color: var(--ink); }
.filter-tab:hover:not(.active) { color: var(--ink2); }

/* ══════════════════════════
   SEARCH
══════════════════════════ */
.search-wrap {
  max-width: 720px; margin: 0 auto;
  padding: 16px 20px 0;
}
.search-box {
  display: flex; align-items: center; gap: 10px;
  border: 1.5px solid var(--pale);
  border-radius: var(--radius);
  padding: 11px 14px;
  background: var(--off);
  transition: border-color 0.15s;
}
.search-box:focus-within { border-color: var(--ink); background: white; }
.search-box input {
  border: none; outline: none;
  font-family: inherit; font-size: 13px;
  color: var(--ink); background: transparent; flex: 1;
  font-weight: 500;
}
.search-box input::placeholder { color: var(--muted); font-weight: 400; }

/* ══════════════════════════
   SECTION LABEL
══════════════════════════ */
.section-label-bar {
  max-width: 720px; margin: 20px auto 0;
  padding: 0 20px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.section-label-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px; color: var(--ink);
  letter-spacing: -0.3px;
}
.section-label-count {
  font-size: 11px; font-weight: 600;
  color: var(--muted); letter-spacing: 0.5px;
}

/* ══════════════════════════
   PRODUCT GRID — EDITORIAL LAYOUT
══════════════════════════ */
.products-wrap {
  max-width: 720px; margin: 0 auto;
  padding: 14px 20px 0;
}

/* Alternating layout: list + grid mix */
.products-list { display: flex; flex-direction: column; gap: 0; }

/* ── Horizontal card (list style) ── */
.prod-card-h {
  display: flex; align-items: stretch;
  border-top: 1px solid var(--pale);
  cursor: pointer;
  transition: background 0.15s;
  padding: 16px 0;
  animation: fadeIn 0.35s ease both;
  gap: 16px;
}
.prod-card-h:last-child { border-bottom: 1px solid var(--pale); }
.prod-card-h:hover { background: var(--off); margin: 0 -20px; padding: 16px 20px; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.ph-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; color: var(--pale);
  width: 24px; flex-shrink: 0;
  padding-top: 2px;
  letter-spacing: 0.5px;
}
.ph-thumb {
  width: 72px; height: 72px; flex-shrink: 0;
  background: var(--warm);
  overflow: hidden;
  position: relative;
}
.ph-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ph-thumb-emoji {
  width: 72px; height: 72px;
  background: var(--warm);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; flex-shrink: 0;
}
.ph-info { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
.ph-cat {
  font-size: 8px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 4px;
}
.ph-name {
  font-family: 'DM Serif Display', serif;
  font-size: 17px; color: var(--ink);
  line-height: 1.2; margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ph-meta {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.ph-badge {
  font-size: 8px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 7px;
  border: 1px solid var(--pale);
  color: var(--muted);
}
.ph-badge.new { border-color: var(--accent); color: var(--accent); }
.ph-badge.best { background: var(--ink); color: white; border-color: var(--ink); }
.ph-out { font-size: 9px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

.ph-right {
  display: flex; flex-direction: column;
  align-items: flex-end; justify-content: center;
  gap: 8px; flex-shrink: 0;
}
.ph-price {
  font-family: 'DM Serif Display', serif;
  font-size: 20px; color: var(--ink);
  white-space: nowrap;
}
.ph-price-sub { font-size: 9px; color: var(--muted); text-align: right; font-weight: 500; }
.ph-add {
  width: 34px; height: 34px;
  background: var(--ink);
  border: none; color: white;
  font-size: 20px; font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
  flex-shrink: 0;
}
.ph-add:active { background: var(--accent); transform: scale(0.92); }
.ph-out-tag {
  font-size: 9px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); border: 1px solid var(--pale);
  padding: 4px 8px;
}

/* ── Featured card (wide) ── */
.prod-card-featured {
  border-top: 1px solid var(--pale);
  cursor: pointer;
  padding: 20px 0;
  animation: fadeIn 0.35s ease both;
  transition: background 0.15s;
}
.prod-card-featured:hover { background: var(--off); margin: 0 -20px; padding: 20px; }
.featured-inner { display: flex; gap: 16px; align-items: stretch; }
.featured-img {
  width: 120px; height: 120px; flex-shrink: 0;
  overflow: hidden; position: relative;
}
.featured-img img { width: 100%; height: 100%; object-fit: cover; }
.featured-img-emoji {
  width: 120px; height: 120px;
  background: linear-gradient(135deg, var(--warm), var(--pale));
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
}
.featured-badge {
  position: absolute; top: 0; left: 0;
  background: var(--ink); color: white;
  font-size: 8px; font-weight: 700;
  padding: 4px 8px; letter-spacing: 1px; text-transform: uppercase;
}
.featured-body { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
.featured-kicker { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.featured-name { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--ink); line-height: 1.15; margin-bottom: 8px; }
.featured-footer { display: flex; align-items: flex-end; justify-content: space-between; }
.featured-price { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--ink); }
.featured-price-sub { font-size: 9px; color: var(--muted); font-weight: 500; margin-top: 1px; }
.featured-add {
  background: var(--accent); color: white;
  border: none; padding: 10px 20px;
  font-family: inherit; font-size: 10px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.featured-add:active { opacity: 0.8; }
.featured-out { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); border: 1px solid var(--pale); padding: 10px 14px; }

/* ══════════════════════════
   COLLECTION CARDS
══════════════════════════ */
.collections-wrap {
  max-width: 720px; margin: 0 auto;
  padding: 16px 20px 0;
}
.col-card {
  display: flex; align-items: center; gap: 16px;
  border-top: 1px solid var(--pale);
  padding: 18px 0;
  cursor: pointer; transition: background 0.15s;
}
.col-card:last-child { border-bottom: 1px solid var(--pale); }
.col-card:hover { background: var(--off); margin: 0 -20px; padding: 18px 20px; }
.col-num { font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: var(--pale); width: 24px; flex-shrink: 0; }
.col-emoji-box {
  width: 54px; height: 54px;
  background: var(--warm);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.col-info { flex: 1; }
.col-name { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--ink); margin-bottom: 2px; }
.col-count { font-size: 11px; color: var(--muted); font-weight: 500; }
.col-arrow { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--pale); letter-spacing: 1px; }

/* ── Back button ── */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: inherit; font-size: 10px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); cursor: pointer;
  background: none; border: none; padding: 0;
  margin-bottom: 16px; transition: color 0.15s;
}
.back-btn:hover { color: var(--ink); }

/* Section divider in category view */
.section-divider {
  max-width: 720px; margin: 28px auto 0;
  padding: 0 20px;
  display: flex; align-items: center; gap: 14px;
}
.sd-line { flex: 1; height: 1px; background: var(--pale); }
.sd-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px; letter-spacing: 3px;
  color: var(--muted);
}

/* ══════════════════════════
   PRODUCT MODAL
══════════════════════════ */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(17,16,20,0.6);
  z-index: 500;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--white);
  border-radius: 0;
  border-top: 3px solid var(--ink);
  width: 100%; max-width: 720px;
  max-height: 93vh; overflow-y: auto;
  animation: slideUp 0.26s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 3px; background: var(--pale); margin: 14px auto 0; }
.modal-photo { width: 100%; height: 160px; object-fit: contain; display: block; background: var(--pale); }
.modal-emoji-big {
  width: 100%; height: 110px;
  background: linear-gradient(135deg, var(--warm), var(--pale));
  display: flex; align-items: center; justify-content: center; font-size: 52px;
}
.close-modal-btn {
  position: absolute; top: 10px; right: 12px;
  width: 32px; height: 32px;
  background: var(--ink); color: white;
  border: none; font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  z-index: 10;
}
body[dir="rtl"] .close-modal-btn { right: auto; left: 12px; }
.modal-body { padding: 12px 18px 24px; }
.modal-kicker { font-size: 8px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.modal-name { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--ink); letter-spacing: -0.5px; line-height: 1.15; margin-bottom: 12px; }

.modal-label {
  font-size: 8px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px; margin-top: 12px; display: block;
}
.variant-select-wrap {
  display: flex; align-items: center; gap: 10px;
  border: 1.5px solid var(--pale); border-radius: 0;
  background: white; padding: 8px 12px;
  cursor: pointer; position: relative;
}
.variant-select {
  flex: 1; border: none; background: transparent;
  font-family: inherit; font-size: 13px; font-weight: 600;
  color: var(--ink); cursor: pointer;
  appearance: none; -webkit-appearance: none;
  outline: none; padding-right: 4px;
}
.variant-select-arrow { font-size: 12px; color: var(--muted); pointer-events: none; }
.variant-select-thumb {
  width: 28px; height: 28px; border-radius: 50%;
  object-fit: cover; flex-shrink: 0;
  border: 1.5px solid rgba(0,0,0,0.08);
}
.variant-select-dot { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(0,0,0,0.1); }

.qty-type-toggle { display: flex; gap: 0; border: 1px solid var(--pale); }
.qty-type-btn {
  flex: 1; padding: 10px 8px;
  border: none; border-right: 1px solid var(--pale);
  background: var(--white);
  font-family: inherit; font-size: 11px; font-weight: 700;
  color: var(--muted); cursor: pointer;
  text-align: center; transition: all 0.12s;
  letter-spacing: 0.5px;
}
.qty-type-btn:last-child { border-right: none; }
.qty-type-btn.active { background: var(--ink); color: white; }

.qty-stepper {
  display: inline-flex; align-items: center;
  border: 1px solid var(--pale);
}
.qty-btn {
  width: 36px; height: 36px;
  border: none; background: var(--off);
  font-size: 18px; cursor: pointer;
  color: var(--ink); display: flex; align-items: center; justify-content: center;
  transition: background 0.1s; font-weight: 300;
}
.qty-btn:active { background: var(--pale); }
.qty-val { min-width: 42px; text-align: center; font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--ink); }

.price-preview {
  background: var(--off);
  border: 1px solid var(--pale);
  padding: 10px 14px; margin-top: 10px;
  display: flex; align-items: center; justify-content: space-between;
  border-left: 3px solid var(--accent);
}
.price-preview-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.price-preview-sub { font-size: 9px; color: var(--muted); margin-top: 1px; }
.price-preview-val { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--ink); }

.add-to-cart-btn {
  width: 100%; padding: 13px;
  background: var(--ink); color: white;
  border: none;
  font-family: inherit; font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; margin-top: 10px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all 0.15s;
}
.add-to-cart-btn:hover { background: var(--accent); }
.add-to-cart-btn:active { opacity: 0.85; }
.add-to-cart-btn:disabled { background: var(--pale); color: var(--muted); cursor: not-allowed; }

/* ══════════════════════════
   CART DRAWER
══════════════════════════ */
.cart-drawer-bg {
  position: fixed; inset: 0;
  background: rgba(17,16,20,0.4);
  z-index: 600; display: none;
}
.cart-drawer-bg.open { display: block; }
.cart-drawer {
  position: fixed; top: 0; bottom: 0; right: 0;
  width: min(380px, 100vw);
  background: var(--white);
  z-index: 700;
  transform: translateX(100%);
  transition: transform 0.26s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  border-left: 2px solid var(--ink);
}
body[dir="rtl"] .cart-drawer { right: auto; left: 0; transform: translateX(-100%); border-left: none; border-right: 2px solid var(--ink); }
.cart-drawer.open { transform: translateX(0) !important; }

.cart-head {
  padding: 20px;
  border-bottom: 1px solid var(--pale);
  display: flex; align-items: flex-start; justify-content: space-between;
  background: var(--off);
}
.cart-head-label { font-size: 8px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.cart-head-title { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--ink); }
.cart-close-btn {
  width: 34px; height: 34px;
  background: var(--ink); color: white;
  border: none; font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.cart-items { flex: 1; overflow-y: auto; padding: 0 20px; }
.cart-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 16px 0; border-bottom: 1px solid var(--pale);
}
.cart-item-thumb {
  width: 54px; height: 54px;
  background: var(--warm); flex-shrink: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center; font-size: 22px;
}
.cart-item-thumb img { width: 100%; height: 100%; object-fit: cover; }
.cart-item-info { flex: 1; }
.cart-item-name { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--ink); margin-bottom: 3px; }
.cart-item-sub { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
.cart-item-row { display: flex; align-items: center; justify-content: space-between; }
.cart-item-price { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--ink); }
.cart-item-remove { background: none; border: none; color: var(--pale); cursor: pointer; font-size: 14px; transition: color 0.15s; }
.cart-item-remove:hover { color: var(--accent); }

.cart-empty { text-align: center; padding: 60px 20px; }
.cart-empty-icon { font-size: 44px; margin-bottom: 14px; }
.cart-empty-text { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--muted); margin-bottom: 6px; }
.cart-empty-sub { font-size: 12px; color: var(--muted); }

.cart-footer { padding: 18px 20px 32px; border-top: 1px solid var(--pale); background: var(--off); }
.field-label { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; display: block; }
.name-input {
  width: 100%; padding: 12px 14px;
  border: 1px solid var(--pale);
  background: white;
  font-family: inherit; font-size: 13px; color: var(--ink);
  outline: none; margin-bottom: 16px;
  transition: border-color 0.15s;
}
.name-input:focus { border-color: var(--ink); }

.cart-total-row {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 14px; padding-bottom: 14px;
  border-bottom: 1px solid var(--pale);
}
.cart-total-label { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.cart-total-val { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--ink); }

.whatsapp-btn {
  width: 100%; padding: 16px;
  background: #25d366; color: white;
  border: none;
  font-family: inherit; font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: opacity 0.15s;
}
.whatsapp-btn:active { opacity: 0.85; }

/* ══════════════════════════
   TOAST
══════════════════════════ */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: white;
  padding: 11px 22px;
  font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  z-index: 900; opacity: 0;
  transition: all 0.22s; white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Loaders */
.loading-wrap { text-align: center; padding: 60px 20px; }
.loading-spinner { width: 28px; height: 28px; border: 2px solid var(--pale); border-top-color: var(--ink); border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
.no-products { text-align: center; padding: 60px 20px; }
.no-products-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--muted); margin-bottom: 8px; }

.variant-thumb {
  width: 28px; height: 28px; border-radius: 50%;
  object-fit: cover; flex-shrink: 0;
  border: 1.5px solid rgba(0,0,0,0.08);
  background: var(--cream2);
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">✦ Wholesale Prices &nbsp;·&nbsp; <span>Order via WhatsApp</span> &nbsp;·&nbsp; New Arrivals ✦</div>

<!-- FILTER BAR -->

</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9a9096" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" placeholder="Search products..." oninput="onSearch()">
  </div>

<!-- CART DRAWER -->
<div class="cart-drawer-bg" id="cart-drawer-bg" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-head">

    <button class="whatsapp-btn" onclick="sendWhatsApp()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      <span id="wa-btn-text">Send Order via WhatsApp</span>
    </button>

<div class="toast" id="toast"></div>

<script>
const T = {
  en: {
    tagline:'Wholesale Beauty', heroSub:'Order by piece or by dozen. Wholesale prices, direct to you.',
    searchPh:'Search products...', allCat:'All', cartTitle:'Order Summary', cartLabel:'Your Order',
    namePh:'e.g. Sara Khalil', nameLabel:'Your Name', totalLabel:'Total',
    waBtnText:'Send Order via WhatsApp', langBtn:'عربي',
    addToOrder:'Add to Order', outOfStock:'Out of Stock',
    piece:'By Piece', dozen:'By Dozen',
    chooseVariant:'Choose Variant', orderType:'Order Type', quantity:'Quantity',
    left:'left', outLabel:'Out', pieces:'pcs', emptyCart:'Cart is Empty',
    emptyCartSub:'Browse and add items to your order',
    noProducts:'No products found', added:'Added to Order',
    totalFor:'Total for', dozenWord:'dozen', eachPc:'each',
    browseCol:'Collections', backTo:'← Back', allCollection:'All Products',
    orderLabel:'Order', products:'Products',
  },
  ar: {
    tagline:'جملة مستحضرات التجميل', heroSub:'اطلب بالقطعة أو بالدزينة',
    searchPh:'ابحث...', allCat:'الكل', cartTitle:'ملخص الطلب', cartLabel:'طلبك',
    namePh:'مثلاً: سارة خليل', nameLabel:'اسمك', totalLabel:'المجموع',
    waBtnText:'أرسل الطلب عبر واتساب', langBtn:'English',
    addToOrder:'أضف للطلب', outOfStock:'غير متوفر',
    piece:'بالقطعة', dozen:'بالدزينة',
    chooseVariant:'اختر النوع', orderType:'نوع الطلب', quantity:'الكمية',
    left:'متبقي', outLabel:'نفد', pieces:'قطعة', emptyCart:'السلة فارغة',
    emptyCartSub:'تصفح وأضف ما تريد',
    noProducts:'لا توجد منتجات', added:'تمت الإضافة',
    totalFor:'المجموع لـ', dozenWord:'دزينة', eachPc:'للقطعة',
    browseCol:'المجموعات', backTo:'← رجوع', allCollection:'كل المنتجات',
    orderLabel:'الطلب', products:'منتج',
  }
};
let lang='en';
function t(k){ return T[lang][k]||T.en[k]||k; }

function toggleLang(){
  lang=lang==='en'?'ar':'en';
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.body.dir=lang==='ar'?'rtl':'ltr';
  applyTranslations(); rebuildBrowseUI();
  if(currentProd) renderModal(); renderCart();
}

function applyTranslations(){
  const s=shopSettings;
  const logoEl=document.getElementById('shop-logo-text');
  if(logoEl) logoEl.textContent=s.shopName||'Shop';
  const tagEl=document.getElementById('shop-tagline');
  if(tagEl) tagEl.textContent=s.eyebrow||t('tagline');
  const eyeEl=document.getElementById('hero-eyebrow');
  if(eyeEl) eyeEl.textContent=s.eyebrow||t('tagline');
  const titleEl=document.getElementById('hero-title');
  if(titleEl) titleEl.innerHTML=s.title?s.title:`Our<br><em>Collection</em>`;
  const subEl=document.getElementById('hero-sub');
  if(subEl) subEl.textContent=s.heroSub||t('heroSub');
  const si=document.getElementById('search-input');
  if(si) si.placeholder=t('searchPh');
  document.getElementById('lang-btn').textContent=t('langBtn');
  document.getElementById('cart-title').textContent=t('cartTitle');
  document.getElementById('cart-label-head').textContent=t('cartLabel');
  document.getElementById('name-label').textContent=t('nameLabel');
  document.getElementById('total-label').textContent=t('totalLabel');
  document.getElementById('wa-btn-text').textContent=t('waBtnText');
  document.getElementById('cart-label-text').textContent=t('orderLabel');
  document.getElementById('customer-name-input').placeholder=t('namePh');
  // Update bg text
  const bgText=document.getElementById('hero-bg-text');
  if(bgText) bgText.textContent=lang==='ar'?'جمال':'BEAUTY';
}

// ── IndexedDB ──
const IDB_NAME='BlossomDB',IDB_VER=2,IDB_STORE='appData';
function openIDB(){return new Promise((res,rej)=>{const req=indexedDB.open(IDB_NAME,IDB_VER);req.onsuccess=e=>res(e.target.result);req.onerror=()=>rej(req.error);req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE);};})}
function idbGet(key){return openIDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction(IDB_STORE,'readonly');const req=tx.objectStore(IDB_STORE).get(key);req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);}))}

let allProducts=[],shopSettings={whatsapp:'',storeFilter:'all',browseMode:'all',brandColor:'#c0536a'};
let allCollections=[];
let cart=[],activeCat='all',activeCollection=null;
let currentProd=null,selVariantId=null,selQtyType='piece',selQty=1;
let searchQuery='',browseView='all';

async function init(){
  try{
    const [prods,settings,cols]=await Promise.all([idbGet('biz_products'),idbGet('biz_shop_settings'),idbGet('biz_collections')]);
    if(settings) shopSettings={...shopSettings,...settings};
    if(shopSettings.brandColor){
      document.documentElement.style.setProperty('--accent',shopSettings.brandColor);
      document.documentElement.style.setProperty('--brand',shopSettings.brandColor);
    }
    let raw=(prods||[]).filter(p=>p&&p.variants&&p.variants.length);
    const vis=raw.filter(p=>p.shopVisible!==false);
    raw=vis.length>0?vis:raw;
    if(shopSettings.storeFilter&&shopSettings.storeFilter!=='all')
      raw=raw.filter(p=>p.store===shopSettings.storeFilter||p.store==='both');
    allProducts=raw; allCollections=cols||[];
    const statEl=document.getElementById('stat-products');
    if(statEl) statEl.textContent=allProducts.length;
    applyTranslations(); rebuildBrowseUI();
  }catch(e){
    document.getElementById('main-content').innerHTML=`<div class="products-wrap"><div class="no-products"><div style="font-size:48px;margin-bottom:16px">📦</div><div class="no-products-title">Shop not set up yet</div><div style="font-size:12px;color:var(--muted)">Open Blossom Business to publish products.</div></div></div>`;
  }
}

function rebuildBrowseUI(){
  const mode=shopSettings.browseMode||'all';
  const catWrap=document.getElementById('cat-pills-wrap');
  if(mode==='all'){
    catWrap.innerHTML=buildCatTabsHTML(); browseView='all'; renderMainContent();
  } else if(mode==='category'){
    catWrap.innerHTML=''; browseView='category'; renderMainContent();
  } else if(mode==='collection'){
    catWrap.innerHTML=''; browseView='collection'; activeCollection=null; renderMainContent();
  }
}

function buildCatTabsHTML(){
  const cats=[...new Set(allProducts.map(p=>p.category).filter(Boolean))];
  let h=`<button class="filter-tab ${activeCat==='all'?'active':''}" onclick="setCat('all',this)">${t('allCat')}</button>`;
  cats.forEach(c=>{ h+=`<button class="filter-tab ${activeCat===c?'active':''}" onclick="setCat('${c.replace(/'/g,"\\'")}',this)">${c}</button>`; });
  return h;
}

function setCat(cat,el){
  activeCat=cat;
  document.querySelectorAll('.filter-tab').forEach(p=>p.classList.remove('active'));
  if(el) el.classList.add('active');
  renderMainContent();
}

function onSearch(){
  searchQuery=(document.getElementById('search-input').value||'').toLowerCase();
  renderMainContent();
}

function renderMainContent(){
  const mode=shopSettings.browseMode||'all';
  const wrap=document.getElementById('main-content');
  if(mode==='all'){
    const f=filterProducts(allProducts);
    wrap.innerHTML=`<div class="products-wrap">${renderSectionLabel(f.length)}${renderProductList(f)}</div>`;
  } else if(mode==='category'){
    renderCategoryView(wrap);
  } else if(mode==='collection'){
    if(browseView==='collection-detail'&&activeCollection) renderCollectionDetail(wrap);
    else renderCollectionIndex(wrap);
  }
}

function renderSectionLabel(count){
  return `<div class="section-label-bar">
    <div class="section-label-title">All Products</div>
    <div class="section-label-count">${count} items</div>
  </div>`;
}

function filterProducts(prods){
  return prods.filter(p=>{
    const mq=!searchQuery||p.name.toLowerCase().includes(searchQuery)||(p.category||'').toLowerCase().includes(searchQuery)||p.variants.some(v=>(v.label||v.name||'').toLowerCase().includes(searchQuery));
    const mc=activeCat==='all'||p.category===activeCat;
    return mq&&mc;
  });
}

function renderCategoryView(wrap){
  const cats=[...new Set(allProducts.map(p=>p.category).filter(Boolean))];
  const allFiltered=filterProducts(allProducts);
  if(!allFiltered.length){wrap.innerHTML=renderNoProducts();return;}
  let html='';
  cats.forEach((cat,ci)=>{
    const prods=filterProducts(allProducts.filter(p=>p.category===cat));
    if(!prods.length) return;
    html+=`<div class="section-divider"><div class="sd-line"></div><div class="sd-text">${cat}</div><div class="sd-line"></div></div>
    <div class="products-wrap" style="padding-top:6px">${renderProductList(prods)}</div>`;
  });
  const uncatProds=filterProducts(allProducts.filter(p=>!p.category));
  if(uncatProds.length) html+=`<div class="section-divider"><div class="sd-line"></div><div class="sd-text">Other</div><div class="sd-line"></div></div>
    <div class="products-wrap" style="padding-top:6px">${renderProductList(uncatProds)}</div>`;
  wrap.innerHTML=html||renderNoProducts();
}

function renderCollectionIndex(wrap){
  let html='<div class="collections-wrap">';
  html+=`<div class="col-card" onclick="showAllProducts()">
    <div class="col-num">01</div>
    <div class="col-emoji-box">🛍️</div>
    <div class="col-info"><div class="col-name">${t('allCollection')}</div><div class="col-count">${allProducts.length} products</div></div>
    <div class="col-arrow">→</div>
  </div>`;
  allCollections.forEach((col,i)=>{
    const n=allProducts.filter(p=>(p.collectionId===col.id)||(p.collections&&p.collections.includes(col.id))).length;
    if(!n) return;
    html+=`<div class="col-card" onclick="openCollection('${col.id}')">
      <div class="col-num">${String(i+2).padStart(2,'0')}</div>
      <div class="col-emoji-box">${col.emoji||'📦'}</div>
      <div class="col-info"><div class="col-name">${col.name}</div><div class="col-count">${n} products</div></div>
      <div class="col-arrow">→</div>
    </div>`;
  });
  html+='</div>';
  wrap.innerHTML=html;
}

function showAllProducts(){browseView='collection-detail';activeCollection={id:'__all__',name:t('allCollection'),emoji:'🛍️'};renderMainContent();}
function openCollection(id){const c=allCollections.find(x=>x.id===id);if(!c)return;activeCollection=c;browseView='collection-detail';renderMainContent();}

function renderCollectionDetail(wrap){
  let prods=activeCollection.id==='__all__'?filterProducts(allProducts):filterProducts(allProducts.filter(p=>(p.collectionId===activeCollection.id)||(p.collections&&p.collections.includes(activeCollection.id))));
  wrap.innerHTML=`<div class="products-wrap">
    <button class="back-btn" onclick="goBackToCollections()">← ${t('browseCol')}</button>
    <div class="section-label-bar" style="margin-top:0">
      <div class="section-label-title">${activeCollection.name}</div>
      <div class="section-label-count">${prods.length} items</div>
    </div>
    ${renderProductList(prods)}
  </div>`;
}
function goBackToCollections(){browseView='collection';activeCollection=null;renderMainContent();}

// ── Product List (editorial style) ──
function renderProductList(prods){
  if(!prods.length) return renderNoProducts();
  let html='<div class="products-list">';
  prods.forEach((p,i)=>{
    const inStock=getTotalQty(p)>0;
    const pp=getPiecePrice(p),dp=getDozenPrice(p);
    const badge=p.catalogBadge==='best'?'best':p.catalogBadge==='new'?'new':'';
    const badgeLabel=p.catalogBadge==='best'?'Best Seller':p.catalogBadge==='new'?'New':'';

    // First item per page gets featured treatment
    if(i===0){
      html+=`<div class="prod-card-featured" style="animation-delay:0s" onclick="openProductModal('${p.id}')">
        <div class="featured-inner">
          <div class="featured-img">
            ${p.photo?`<img src="${p.photo}" alt="${p.name}" loading="lazy">`:`<div class="featured-img-emoji">${p.emoji||'📦'}</div>`}
            ${badgeLabel?`<div class="featured-badge">${badgeLabel}</div>`:''}
          </div>
          <div class="featured-body">
            <div>
              ${p.category?`<div class="featured-kicker">${p.category}</div>`:''}
              <div class="featured-name">${p.name}</div>
            </div>
            <div class="featured-footer">
              <div>
                <div class="featured-price">${pp?'$'+pp.toFixed(2):''}</div>
                ${dp?`<div class="featured-price-sub">x12: $${(dp*12).toFixed(2)}</div>`:''}
              </div>
              ${inStock
                ?`<button class="featured-add" onclick="event.stopPropagation();openProductModal('${p.id}')">+ Add</button>`
                :`<div class="featured-out">${t('outLabel')}</div>`}
            </div>
          </div>
        </div>
      </div>`;
    } else {
      const numStr=String(i+1).padStart(2,'0');
      html+=`<div class="prod-card-h" style="animation-delay:${i*0.035}s" onclick="openProductModal('${p.id}')">
        <div class="ph-num">${numStr}</div>
        ${p.photo?`<img class="ph-thumb" src="${p.photo}" alt="${p.name}" loading="lazy" style="object-fit:cover;width:72px;height:72px;">`:`<div class="ph-thumb-emoji">${p.emoji||'📦'}</div>`}
        <div class="ph-info">
          ${p.category?`<div class="ph-cat">${p.category}</div>`:''}
          <div class="ph-name">${p.name}</div>
          <div class="ph-meta">
            ${badgeLabel?`<div class="ph-badge ${badge}">${badgeLabel}</div>`:''}
            ${!inStock?`<div class="ph-out">${t('outLabel')}</div>`:''}
          </div>
        </div>
        <div class="ph-right">
          <div>
            <div class="ph-price">${pp?'$'+pp.toFixed(2):''}</div>
            ${dp?`<div class="ph-price-sub">x12: $${(dp*12).toFixed(2)}</div>`:''}
          </div>
          ${inStock
            ?`<button class="ph-add" onclick="event.stopPropagation();openProductModal('${p.id}')">+</button>`
            :`<div class="ph-out-tag">${t('outLabel')}</div>`}
        </div>
      </div>`;
    }
  });
  html+='</div>';
  return html;
}

function renderNoProducts(){
  return `<div class="no-products" style="margin-top:20px"><div style="font-size:44px;margin-bottom:14px">🔍</div><div class="no-products-title">${t('noProducts')}</div></div>`;
}

// ── Helpers ──
function getTotalQty(p){return(p.variants||[]).reduce((s,v)=>s+(v.flora||0)+(v.ra||0),0);}
function getVariantQty(v){return(v.flora||0)+(v.ra||0);}
function getPiecePrice(p){return p.priceRAPiece||p.priceFlora||p.price||0;}
function getDozenPrice(p){return p.priceRADozen||0;}
function fmtLabel(v){return[v.label,v.name&&v.name!=='Standard'?v.name:'',v.size].filter(Boolean).join(' · ')||'';}

function openProductModal(id){const p=allProducts.find(x=>x.id===id);if(p)_openModal(p);}
function _openModal(p){
  currentProd=p;selQtyType='piece';selQty=1;
  const first=p.variants.find(v=>getVariantQty(v)>0)||p.variants[0];
  selVariantId=first?.id||null;
  renderModal();
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow='hidden';
  history.pushState({modal:true},'');
}
function _closeModalUI(){document.getElementById('modal-bg').classList.remove('open');document.body.style.overflow='';currentProd=null;}
function closeModal(){if(history.state&&history.state.modal){history.back();}else{_closeModalUI();}}
function handleModalBgClick(e){if(e.target===document.getElementById('modal-bg'))closeModal();}
window.addEventListener('popstate',function(){if(document.getElementById('modal-bg').classList.contains('open')){_closeModalUI();}});

function renderModal(){
  const p=currentProd;if(!p)return;
  const pp=getPiecePrice(p),dp=getDozenPrice(p);
  const hasRV=p.variants.length>1||(p.variants.length===1&&p.variants[0].name&&p.variants[0].name!=='Standard'&&p.variants[0].name!=='');
  const selV=p.variants.find(v=>v.id===selVariantId)||p.variants[0];
  const stock=selV?getVariantQty(selV):0;
  const hd=dp>0&&stock>=12;
  const unit=selQtyType==='dozen'?dp*12:pp;
  const total=unit*selQty;
  const qtyDisp=selQtyType==='dozen'?selQty+' '+t('dozenWord')+' ('+(selQty*12)+' '+t('pieces')+')':selQty+' '+t('pieces');
  const canAdd=stock>0&&unit>0;
  document.getElementById('modal-content').innerHTML=`
    ${p.photo?`<img class="modal-photo" src="${p.photo}" alt="${p.name}">`:`<div class="modal-emoji-big">${p.emoji||'📦'}</div>`}
    <div class="modal-body">
      ${p.category?`<div class="modal-kicker">${p.category}</div>`:''}
      <div class="modal-name">${p.name}</div>
      ${hasRV?`<span class="modal-label">${t('chooseVariant')}</span>
        <div class="variant-select-wrap">
          ${(()=>{ const selV2=p.variants.find(v=>v.id===selVariantId)||p.variants[0]; const vPhoto2=selV2?.photo||null; const nc2=!selV2?.colorHex||['#ede6e8','#f4a0b0',''].includes(selV2?.colorHex); return vPhoto2?`<img class="variant-select-thumb" src="${vPhoto2}" alt="">`:!nc2?`<div class="variant-select-dot" style="background:${selV2.colorHex}"></div>`:''})()}
          <select class="variant-select" onchange="selectVariant(this.value)">
            ${p.variants.map(v=>{ const qty=getVariantQty(v); const lbl=fmtLabel(v)||'Standard'; const stock=qty>0?` · ${qty} ${t('left')}`:`· ${t('outLabel')}`; return `<option value="${v.id}" ${v.id===selVariantId?'selected':''} ${qty===0?'disabled':''}>${lbl}${stock}</option>`; }).join('')}
          </select>
          <span class="variant-select-arrow">▾</span>
        </div>`:''}
      ${(pp>0||hd)?`<span class="modal-label">${t('orderType')}</span>
        <div class="qty-type-toggle">
          ${pp?`<button class="qty-type-btn ${selQtyType==='piece'?'active':''}" onclick="setQtyType('piece')">${t('piece')}<br><span style="font-size:9px;opacity:0.65">$${pp.toFixed(2)} ${t('eachPc')}</span></button>`:''}
          ${hd?`<button class="qty-type-btn ${selQtyType==='dozen'?'active':''}" onclick="setQtyType('dozen')">${t('dozen')}<br><span style="font-size:9px;opacity:0.65">$${(dp*12).toFixed(2)}</span></button>`:''}
        </div>`:''}
      <span class="modal-label">${t('quantity')}</span>
      <div class="qty-stepper">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <div class="qty-val">${selQty}</div>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
      ${unit>0?`<div class="price-preview">
        <div>
          <div class="price-preview-label">${t('totalFor')} ${qtyDisp}</div>
          <div class="price-preview-sub">${selQtyType==='dozen'?'$'+(dp*12).toFixed(2)+'×'+selQty:'$'+pp.toFixed(2)+'×'+selQty}</div>
        </div>
        <div class="price-preview-val">$${total.toFixed(2)}</div>
      </div>`:''}
      <button class="add-to-cart-btn" onclick="addToCart()" ${!canAdd?'disabled':''}>${canAdd?t('addToOrder'):t('outOfStock')}</button>
    </div>`;
}

function selectVariant(vid){selVariantId=vid;renderModal();}
function setQtyType(type){selQtyType=type;selQty=1;renderModal();}
function changeQty(d){
  const selV=currentProd.variants.find(v=>v.id===selVariantId)||currentProd.variants[0];
  const stock=selV?getVariantQty(selV):0;
  const maxQty=selQtyType==='dozen'?Math.floor(stock/12):stock;
  selQty=Math.min(Math.max(1,selQty+d),Math.max(1,maxQty));
  renderModal();
}

function addToCart(){
  const p=currentProd;
  const selV=p.variants.find(v=>v.id===selVariantId)||p.variants[0];
  const price=selQtyType==='dozen'?getDozenPrice(p):getPiecePrice(p);
  const label=selV?fmtLabel(selV):'';
  const ex=cart.find(ci=>ci.productId===p.id&&ci.variantId===(selV?.id||null)&&ci.qtyType===selQtyType);
  if(ex){ex.qty+=selQty;}else{
    cart.push({productId:p.id,variantId:selV?.id||null,name:p.name,emoji:p.emoji||'📦',photo:p.photo||'',variantLabel:label,qtyType:selQtyType,qty:selQty,unitPrice:price});
  }
  updateCartCount();closeModal();showToast(t('added'));
}

function updateCartCount(){
  const n=cart.reduce((s,ci)=>s+ci.qty,0);
  const el=document.getElementById('cart-count');
  el.textContent=n;el.classList.toggle('has-items',n>0);
}

function openCart(){document.getElementById('cart-drawer-bg').classList.add('open');document.getElementById('cart-drawer').classList.add('open');document.body.style.overflow='hidden';renderCart();}
function closeCart(){document.getElementById('cart-drawer-bg').classList.remove('open');document.getElementById('cart-drawer').classList.remove('open');document.body.style.overflow='';}

function renderCart(){
  const listEl=document.getElementById('cart-items-list'),footerEl=document.getElementById('cart-footer');
  if(!cart.length){
    listEl.innerHTML=`<div class="cart-empty"><div class="cart-empty-icon">🛒</div><div class="cart-empty-text">${t('emptyCart')}</div><div class="cart-empty-sub">${t('emptyCartSub')}</div></div>`;
    footerEl.style.display='none';return;
  }
  footerEl.style.display='block';let total=0;
  listEl.innerHTML=cart.map((ci,i)=>{
    const lt=ci.unitPrice*ci.qty;total+=lt;
    const ql=ci.qtyType==='dozen'?ci.qty+' '+t('dozenWord')+' ('+(ci.qty*12)+' '+t('pieces')+')':ci.qty+' '+t('pieces');
    const nc=!ci.colorHex||['#ede6e8',''].includes(ci.colorHex);
    return `<div class="cart-item">
      <div class="cart-item-thumb">${ci.photo?`<img src="${ci.photo}" alt="${ci.name}">`:ci.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${ci.name}</div>
        <div class="cart-item-sub">${ci.variantLabel?ci.variantLabel+' · ':''}${ql}${!nc?`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${ci.colorHex};margin-inline-start:4px;vertical-align:middle"></span>`:''}</div>
        <div class="cart-item-row"><div class="cart-item-price">$${lt.toFixed(2)}</div><button class="cart-item-remove" onclick="removeCartItem(${i})">🗑</button></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('cart-total').textContent='$'+total.toFixed(2);
}

function removeCartItem(i){cart.splice(i,1);updateCartCount();renderCart();}

function sendWhatsApp(){
  if(!cart.length)return;
  const name=document.getElementById('customer-name-input').value.trim();
  const isAr=lang==='ar';
  let msg=isAr?`🛍️ *طلب جديد${name?' من '+name:''}*\n\n`:`🛍️ *New Order${name?' from '+name:''}*\n\n`;
  let total=0;
  cart.forEach(ci=>{
    const lt=ci.unitPrice*ci.qty;total+=lt;
    const ql=ci.qtyType==='dozen'?(isAr?ci.qty+' دزينة ('+ci.qty*12+' قطعة)':ci.qty+' dozen ('+ci.qty*12+' pcs)'):(isAr?ci.qty+' قطعة':ci.qty+' pc'+(ci.qty>1?'s':''));
    msg+=`• *${ci.name}*`;if(ci.variantLabel)msg+=` (${ci.variantLabel})`;msg+=` — ${ql} — $${lt.toFixed(2)}\n`;
  });
  msg+=isAr?`\n💰 *المجموع: $${total.toFixed(2)}*`:`\n💰 *Total: $${total.toFixed(2)}*`;
  if(name)msg+=isAr?`\n👤 الاسم: ${name}`:`\n👤 Name: ${name}`;
  const waNum=(shopSettings.whatsapp||'').replace(/\D/g,'');
  window.open(`https://wa.me/${waNum}?text=${encodeURIComponent(msg)}`,'_blank');
}

function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

init();
</script>
