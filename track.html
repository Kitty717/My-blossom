<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Track Your Order · RA Jemle LB</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#b8860b;--gold2:#c9900a;--gold3:#e8b84b;--gold4:#f5d080;
  --ink:#2c1a20;--ink2:#5a3a42;--muted:#9a8078;
  --rose:#c0536a;--rose2:#f0d0d8;
  --cream:#fdf8f2;--warm:#faf4ee;--sand:#f5ede0;--petal:#fdeef2;
  --light:#ede0d8;--lighter:#f5ede8;
  --green:#2a8a56;--red:#c0536a;
  --shadow:0 4px 20px rgba(44,26,32,0.08);
  --shadow-lg:0 16px 48px rgba(44,26,32,0.14);
}
html,body{min-height:100vh;background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--ink);overflow-x:hidden}

/* ── HERO ── */
.hero{
  background:linear-gradient(160deg,var(--sand) 0%,var(--warm) 50%,var(--petal) 100%);
  padding:44px 24px 64px;text-align:center;position:relative;overflow:hidden;
}
.hero-pattern{
  position:absolute;inset:0;opacity:0.04;
  background-image:repeating-linear-gradient(45deg,var(--gold2) 0,var(--gold2) 1px,transparent 0,transparent 50%);
  background-size:20px 20px;
}
.hero-glow{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(201,144,10,0.08),transparent 70%);top:-100px;left:50%;transform:translateX(-50%);pointer-events:none}
.hero-stripe{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold3),var(--gold4),var(--gold3),transparent)}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;margin-bottom:18px;animation:fadeUp 0.6s ease both}
.hero-line{width:24px;height:1px;background:var(--gold3)}
.hero-eyebrow span{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold2)}
.hero-logo{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:700;color:var(--ink);line-height:1;margin-bottom:6px;animation:fadeUp 0.6s 0.08s ease both}
.hero-logo em{color:var(--gold2);font-style:italic}
.hero-tagline{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:18px;animation:fadeUp 0.6s 0.15s ease both}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:white;border:1px solid var(--light);
  border-radius:50px;padding:6px 16px;
  box-shadow:0 2px 12px rgba(44,26,32,0.06);
  animation:fadeUp 0.6s 0.22s ease both;
}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--gold3);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.hero-badge span{font-size:12px;font-weight:600;color:var(--ink2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── WRAP ── */
.wrap{width:100%;max-width:480px;margin:0 auto;padding:0 16px 80px}

/* ── SEARCH CARD ── */
.search-card{
  background:white;border-radius:24px;padding:22px;
  margin:-32px 0 20px;position:relative;z-index:10;
  box-shadow:var(--shadow-lg);
  border:1px solid rgba(201,144,10,0.12);
  animation:cardUp 0.7s 0.3s cubic-bezier(0.34,1.3,0.64,1) both;
}
@keyframes cardUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.search-tabs{display:flex;gap:4px;background:var(--warm);border-radius:12px;padding:4px;margin-bottom:18px}
.stab{flex:1;padding:9px;border-radius:9px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.2s}
.stab.active{background:white;color:var(--gold2);box-shadow:0 2px 10px rgba(44,26,32,0.08)}
.search-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.search-row{display:flex;gap:8px}
.search-inp{
  flex:1;background:var(--warm);border:1.5px solid var(--lighter);
  border-radius:12px;padding:13px 16px;font-size:15px;font-weight:700;
  color:var(--ink);font-family:'DM Sans',sans-serif;outline:none;
  letter-spacing:0.5px;transition:all 0.25s;
}
.search-inp::placeholder{color:#c5b5aa;font-weight:400;letter-spacing:0;font-size:14px}
.search-inp:focus{border-color:var(--gold3);background:white;box-shadow:0 0 0 4px rgba(201,144,10,0.08)}
.search-btn{
  background:linear-gradient(135deg,var(--ink),var(--ink2));
  border:none;border-radius:12px;padding:13px 20px;
  font-size:13px;font-weight:700;color:white;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  white-space:nowrap;transition:transform 0.15s;
  letter-spacing:0.3px;
}
.search-btn:active{transform:scale(0.96)}
.search-hint{font-size:11px;color:var(--muted);margin-top:10px;text-align:center}
.search-hint b{color:var(--gold2)}

/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,var(--lighter) 25%,var(--sand) 50%,var(--lighter) 75%);background-size:300% 100%;animation:shimmer 1.5s ease infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}

/* ── ORDER CARD ── */
.order-card{
  background:white;border-radius:22px;overflow:hidden;
  margin-bottom:14px;
  box-shadow:0 2px 12px rgba(44,26,32,0.08);
  border:1px solid var(--lighter);
  opacity:0;transform:translateY(18px) scale(0.98);
  transition:opacity 0.55s ease, transform 0.55s cubic-bezier(0.34,1.3,0.64,1), box-shadow 0.55s ease;
}
.order-card.revealed{
  opacity:1;transform:translateY(0) scale(1);
  box-shadow:0 8px 40px rgba(44,26,32,0.12);
}

/* Header */
.order-hdr{
  padding:20px;background:linear-gradient(135deg,var(--sand) 0%,var(--warm) 100%);
  border-bottom:1px solid var(--light);position:relative;overflow:hidden;
}
.order-hdr-accent{position:absolute;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(201,144,10,0.1),transparent 70%);right:-40px;top:-40px}
.order-hdr-stripe{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold3),transparent)}
.order-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.order-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--gold2);letter-spacing:1px}
.status-pill{padding:5px 12px;border-radius:50px;font-size:10px;font-weight:700;letter-spacing:0.5px;border:1.5px solid}
.pill-pending{background:#fffbeb;color:#92400e;border-color:#fbbf24}
.pill-confirmed{background:#f0fdf4;color:#166534;border-color:#86efac}
.pill-shipped{background:#eff6ff;color:#1e40af;border-color:#93c5fd}
.pill-delivered{background:#f0fdf4;color:#166534;border-color:#4ade80}
.pill-cancelled{background:var(--petal);color:var(--red);border-color:var(--rose2)}
.order-customer{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:3px}
.order-date{font-size:11px;color:var(--muted)}
.order-detail{font-size:11px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px}

/* Progress bar */
.prog-section{padding:16px 20px 14px;border-bottom:1px solid var(--lighter);background:white}
.prog-track{height:5px;background:var(--lighter);border-radius:5px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold3),var(--gold4));border-radius:5px;width:0%;transition:width 1.1s cubic-bezier(0.34,1.3,0.64,1)}
.prog-labels{display:flex;justify-content:space-between}
.prog-lbl{font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);transition:color 0.3s}
.prog-lbl.active{color:var(--gold2)}

/* Steps */
.steps-section{padding:20px 20px 8px}
.step{display:flex;gap:14px;padding-bottom:20px;position:relative;opacity:0;transform:translateX(-14px);transition:all 0.45s cubic-bezier(0.34,1.3,0.64,1)}
.step.in{opacity:1;transform:translateX(0)}
.step:last-child{padding-bottom:8px}
.step-line{position:absolute;left:17px;top:38px;bottom:0;width:2px;background:linear-gradient(180deg,var(--light),transparent)}
.step:last-child .step-line{display:none}
.step-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all 0.4s cubic-bezier(0.34,1.9,0.64,1)}
.step-dot.done{background:linear-gradient(135deg,var(--green),#38b275);color:white;box-shadow:0 4px 12px rgba(42,138,86,0.25)}
.step-dot.active{background:linear-gradient(135deg,var(--gold2),var(--gold3));color:white;box-shadow:0 4px 16px rgba(201,144,10,0.35);animation:pingGold 2s ease infinite}
.step-dot.waiting{background:var(--warm);border:2px dashed var(--light);color:var(--muted);font-size:13px}
@keyframes pingGold{0%,100%{box-shadow:0 4px 16px rgba(201,144,10,0.35)}50%{box-shadow:0 4px 24px rgba(201,144,10,0.55),0 0 0 8px rgba(201,144,10,0.07)}}
.step-info{flex:1;padding-top:7px}
.step-title{font-size:13px;font-weight:700;color:var(--ink)}
.step-title.dim{color:var(--muted)}
.step-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.55}
.step-sub.highlight{color:var(--gold2);font-weight:600}
.step-time{font-size:10px;color:var(--muted);margin-top:3px}

/* Cancelled */
.cancelled-section{padding:28px 20px;text-align:center}
.cancelled-emoji{font-size:44px;margin-bottom:12px}
.cancelled-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--red);margin-bottom:6px}
.cancelled-sub{font-size:13px;color:var(--muted);line-height:1.6}

/* Items */
.items-section{border-top:1px solid var(--lighter);padding:16px 20px}
.section-ttl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.item-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--warm)}
.item-row:last-child{border:none}
.item-thumb{width:44px;height:44px;border-radius:10px;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;border:1px solid var(--lighter)}
.item-thumb img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-variant{font-size:11px;color:var(--muted);margin-top:1px}
.item-qty-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.item-note-lbl{font-size:10px;color:var(--muted);font-style:italic;margin-top:3px;background:var(--warm);border-radius:5px;padding:2px 7px;display:inline-block}
.item-price{font-size:14px;font-weight:700;color:var(--gold2);flex-shrink:0}

/* Total */
.total-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;
  background:linear-gradient(135deg,var(--sand),var(--warm));
  border-top:1.5px solid rgba(201,144,10,0.15);
}
.total-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.total-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--gold2)}

/* Order list (phone search) */
.list-header{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.osc{
  background:white;border-radius:16px;padding:14px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  border:1px solid var(--lighter);box-shadow:var(--shadow);
  transition:all 0.2s;
  opacity:0;transform:translateY(10px);
}
.osc.in{opacity:1;transform:translateY(0)}
.osc:active{transform:scale(0.98)}
.osc-num{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold2);flex-shrink:0;min-width:90px}
.osc-info{flex:1}
.osc-date{font-size:11px;color:var(--muted);margin-top:1px}
.osc-status{font-size:11px;font-weight:600;margin-bottom:1px}
.osc-price{font-size:14px;font-weight:700;color:var(--ink);flex-shrink:0}

/* WA */
.wa-btn{
  width:100%;background:linear-gradient(135deg,#25d366,#1da851);
  border:none;border-radius:14px;padding:14px;
  font-size:14px;font-weight:700;color:white;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 6px 20px rgba(37,211,102,0.25);
  transition:transform 0.2s;margin-top:4px;
}
.wa-btn:active{transform:scale(0.97)}

/* Empty */
.empty-card{background:white;border-radius:20px;padding:40px 24px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--lighter)}
.empty-icon{font-size:52px;margin-bottom:14px;display:block}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--muted);line-height:1.7}
.empty-ex{display:inline-block;margin-top:12px;background:var(--warm);border:1.5px solid var(--light);border-radius:8px;padding:6px 16px;font-size:14px;font-weight:700;color:var(--gold2);letter-spacing:1px}

/* Back */
.back-btn{background:none;border:none;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;margin-bottom:12px;padding:0;transition:color 0.2s}
.back-btn:hover{color:var(--ink)}

/* Confetti */
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(80px) rotate(720deg);opacity:0}}
.conf{position:fixed;width:7px;height:7px;border-radius:2px;pointer-events:none;animation:confetti 1.6s ease forwards}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-pattern"></div>
  <div class="hero-glow"></div>
  <div class="hero-stripe"></div>
  <div class="hero-eyebrow">
    <div class="hero-line"></div>
    <span>Wholesale Beauty · Lebanon</span>
    <div class="hero-line"></div>
  </div>
  <div class="hero-logo">RA <em>Jemle</em></div>
  <div class="hero-tagline">Track your order</div>
  <div class="hero-badge">
    <div class="hero-badge-dot"></div>
    <span>Real-time order tracking</span>
  </div>
</div>

<div class="wrap">
  <!-- SEARCH -->
  <div class="search-card">
    <div class="search-tabs">
      <button class="stab active" id="tab-num" onclick="switchTab('num')">📦 Order Number</button>
      <button class="stab" id="tab-phone" onclick="switchTab('phone')">📞 Phone Number</button>
    </div>
    <div class="search-label" id="search-label">Enter your order number</div>
    <div class="search-row">
      <input class="search-inp" id="order-input"
        placeholder="e.g. RA-1234" maxlength="15"
        onkeydown="if(event.key==='Enter') doSearch()"
        oninput="formatInput(this)">
      <button class="search-btn" onclick="doSearch()">Track →</button>
    </div>
    <div class="search-hint" id="search-hint">Your order number looks like <b>RA-1234</b></div>
  </div>

  <div id="result"></div>
</div>

<script>
const FB_DB_URL = 'https://ra-shop-3e01d-default-rtdb.firebaseio.com';
let _mode = 'num';
let _allOrders = [];

const STEPS = [
  { key:'pending',   icon:'📋', label:'Order Received',  active:'We got your order and are reviewing it! 👀',          done:'Received & logged' },
  { key:'confirmed', icon:'✅', label:'Confirmed',        active:'Confirmed! We\'re preparing your items carefully 📦', done:'Confirmed & prepared' },
  { key:'shipped',   icon:'🚚', label:'On Its Way',       active:'Your order is on the way to you! 🚀',                 done:'Shipped' },
  { key:'delivered', icon:'🎉', label:'Delivered',        active:'Your order has arrived! Enjoy 💛',                    done:'Delivered!' },
];
const STATUS_IDX = { pending:0, confirmed:1, shipped:2, delivered:3 };
const STATUS_PCT = { pending:8, confirmed:38, shipped:72, delivered:100 };
const STATUS_COLORS = { pending:'#92400e', confirmed:'#166534', shipped:'#1e40af', delivered:'#166534', cancelled:'var(--red)' };
const STATUS_LABELS = { pending:'Pending ⏳', confirmed:'Confirmed ✅', shipped:'Shipped 🚚', delivered:'Delivered 🎉', cancelled:'Cancelled' };

function switchTab(mode){
  _mode = mode;
  document.getElementById('tab-num').classList.toggle('active', mode==='num');
  document.getElementById('tab-phone').classList.toggle('active', mode==='phone');
  const inp = document.getElementById('order-input');
  const lbl = document.getElementById('search-label');
  const hint = document.getElementById('search-hint');
  inp.value = '';
  document.getElementById('result').innerHTML = '';
  if(mode==='num'){
    inp.placeholder='e.g. RA-1234';
    lbl.textContent='Enter your order number';
    hint.innerHTML='Your order number looks like <b>RA-1234</b>';
  } else {
    inp.placeholder='e.g. 03123456';
    lbl.textContent='Enter your phone number';
    hint.innerHTML='We\'ll find all orders linked to your number';
  }
}

function formatInput(inp){
  if(_mode==='num') inp.value = inp.value.toUpperCase();
}

async function doSearch(){
  const val = document.getElementById('order-input').value.trim();
  if(!val) return;
  const res = document.getElementById('result');

  // Show skeleton
  res.innerHTML = `
    <div style="background:white;border-radius:22px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--lighter)">
      <div style="padding:20px;background:linear-gradient(135deg,var(--sand),var(--warm));border-bottom:1px solid var(--light)">
        <div class="skel" style="height:28px;width:42%;margin-bottom:14px"></div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><div class="skel" style="height:15px;width:120px;margin-bottom:6px"></div><div class="skel" style="height:11px;width:80px"></div></div>
          <div class="skel" style="height:22px;width:80px;border-radius:50px"></div>
        </div>
      </div>
      <div style="padding:16px 20px;border-bottom:1px solid var(--lighter)">
        <div class="skel" style="height:5px;width:100%;border-radius:5px;margin-bottom:10px"></div>
        <div style="display:flex;justify-content:space-between">${['Received','Confirmed','Shipped','Delivered'].map(()=>`<div class="skel" style="height:9px;width:18%"></div>`).join('')}</div>
      </div>
      <div style="padding:20px">${[0,1,2,3].map(i=>`
        <div style="display:flex;gap:14px;margin-bottom:18px">
          <div class="skel" style="width:36px;height:36px;border-radius:50%;flex-shrink:0"></div>
          <div style="flex:1;padding-top:6px">
            <div class="skel" style="height:13px;width:55%;margin-bottom:7px"></div>
            <div class="skel" style="height:11px;width:75%"></div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;

  try {
    if(_mode === 'num'){
      const r = await fetch(`${FB_DB_URL}/orders/${val.toUpperCase()}.json`);
      const o = await r.json();
      if(!o||!o.id) throw new Error('not found');
      _allOrders = [o];
      renderSingle(o);
    } else {
      const phone = val.replace(/\D/g,'');
      if(!phone) throw new Error('invalid');
      const r = await fetch(`${FB_DB_URL}/orders.json`);
      const data = await r.json();
      if(!data) throw new Error('not found');
      const matches = Object.values(data)
        .filter(o=> o && !o.deleted && (o.customerPhone||'').replace(/\D/g,'').includes(phone))
        .sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
      if(!matches.length) throw new Error('not found');
      _allOrders = matches;
      if(matches.length===1) renderSingle(matches[0]);
      else renderList(matches);
    }
  } catch(e){
    res.innerHTML = `
      <div class="empty-card">
        <span class="empty-icon">🔍</span>
        <div class="empty-title">Order Not Found</div>
        <div class="empty-sub">We couldn't find an order with that ${_mode==='num'?'number':'phone number'}.<br>Double-check and try again.</div>
        ${_mode==='num'?`<div class="empty-ex">RA-1234</div>`:''}
      </div>`;
  }
}

function renderList(orders){
  const res = document.getElementById('result');
  const statusColor = s => STATUS_COLORS[s]||'var(--muted)';
  res.innerHTML = `
    <div class="list-header">${orders.length} order${orders.length!==1?'s':''} found</div>
    ${orders.map((o,i)=>`
      <div class="osc" id="osc-${i}" onclick="_allOrders=${JSON.stringify(orders).replace(/`/g,"'")};renderSingle(${JSON.stringify(o).replace(/"/g,'&quot;')})">
        <div class="osc-num">${o.id}</div>
        <div class="osc-info">
          <div class="osc-status" style="color:${statusColor(o.status)}">${STATUS_LABELS[o.status]||o.status}</div>
          <div class="osc-date">${o.createdAt?new Date(o.createdAt).toLocaleDateString('en',{day:'numeric',month:'short',year:'numeric'}):''}</div>
        </div>
        <div class="osc-price">$${(o.total||0).toFixed(0)}</div>
        <span style="color:var(--muted);font-size:16px">›</span>
      </div>`).join('')}`;

  orders.forEach((_,i)=>setTimeout(()=>{ const el=document.getElementById('osc-'+i); if(el) el.classList.add('in'); }, i*70));
}

function renderSingle(order){
  const res = document.getElementById('result');
  const status = order.status||'pending';
  const cancelled = status==='cancelled';
  const idx = STATUS_IDX[status]??0;
  const pct = STATUS_PCT[status]??8;

  const date = order.createdAt ? new Date(order.createdAt).toLocaleDateString('en',{weekday:'short',day:'numeric',month:'long',year:'numeric'}) : '—';
  const time = order.createdAt ? new Date(order.createdAt).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}) : '';
  const items = order.items||[];
  const total = order.total||0;

  const statusPillCls = {pending:'pill-pending',confirmed:'pill-confirmed',shipped:'pill-shipped',delivered:'pill-delivered',cancelled:'pill-cancelled'}[status]||'pill-pending';

  const stepsHtml = cancelled
    ? `<div class="cancelled-section">
        <div class="cancelled-emoji">❌</div>
        <div class="cancelled-title">Order Cancelled</div>
        <div class="cancelled-sub">This order has been cancelled.<br>Contact us if you have any questions.</div>
      </div>`
    : `<div class="steps-section">
        ${STEPS.map((s,i)=>{
          const done = i<idx, active = i===idx;
          const cls = done?'done':active?'active':'waiting';
          return `<div class="step" id="st-${i}">
            <div class="step-line"></div>
            <div class="step-dot ${cls}">${done?'✓':s.icon}</div>
            <div class="step-info">
              <div class="step-title${!done&&!active?' dim':''}">${s.label}</div>
              <div class="step-sub${active?' highlight':''}">${active?s.active:done?s.done:'Waiting...'}</div>
              ${active&&time?`<div class="step-time">Updated ${time}</div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>`;

  const itemsHtml = items.length ? `
    <div class="items-section">
      <div class="section-ttl">Order Items</div>
      ${items.map(it=>`
        <div class="item-row">
          <div class="item-thumb">${it.photo?`<img src="${it.photo}">`:(it.emoji||'📦')}</div>
          <div class="item-info">
            <div class="item-name">${it.name||''}</div>
            ${it.variantLabel?`<div class="item-variant">${it.variantLabel}</div>`:''}
            <div class="item-qty-lbl">${it.qty||1} ${it.qtyType==='dozen'?'dozen':'pc'}</div>
            ${it.note?`<div class="item-note-lbl">📝 ${it.note}</div>`:''}
          </div>
          <div class="item-price">$${((it.unitPrice||0)*(it.qty||1)).toFixed(2)}</div>
        </div>`).join('')}
    </div>
    <div class="total-bar">
      <span class="total-lbl">Order Total</span>
      <span class="total-val">$${total.toFixed(2)}</span>
    </div>` : '';

  const wa = (order.shopWA||'').replace(/\D/g,'');
  const waHtml = wa ? `<button class="wa-btn" onclick="window.open('https://wa.me/${wa}','_blank')">💬 Need help? Chat with us on WhatsApp</button>` : '';
  const backHtml = _allOrders.length>1 ? `<button class="back-btn" onclick="renderList(_allOrders)">← All orders</button>` : '';

  res.innerHTML = `
    ${backHtml}
    <div class="order-card" id="ocard">
      <div class="order-hdr">
        <div class="order-hdr-accent"></div>
        <div class="order-hdr-stripe"></div>
        <div class="order-top">
          <div class="order-num">${order.id}</div>
          <div class="status-pill ${statusPillCls}">${STATUS_LABELS[status]||status}</div>
        </div>
        <div class="order-customer">${order.customerName||'Customer'}</div>
        <div class="order-date">${date}${time?' · '+time:''}</div>
        ${order.address?`<div class="order-detail">📍 ${order.address}</div>`:''}
        ${order.notes?`<div class="order-detail">💬 ${order.notes}</div>`:''}
      </div>
      ${!cancelled?`
      <div class="prog-section">
        <div class="prog-track"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
        <div class="prog-labels">
          ${['pending','confirmed','shipped','delivered'].map((s,i)=>`<span class="prog-lbl${status===s?' active':''}">${['Received','Confirmed','Shipped','Delivered'][i]}</span>`).join('')}
        </div>
      </div>`:''}
      ${stepsHtml}
      ${itemsHtml}
    </div>
    ${waHtml}`;

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const card = document.getElementById('ocard');
    if(card) setTimeout(()=>card.classList.add('revealed'), 40);
    const fill = document.getElementById('pfill');
    if(fill) setTimeout(()=>fill.style.width=pct+'%', 250);
    STEPS.forEach((_,i)=>setTimeout(()=>{ const el=document.getElementById('st-'+i); if(el) el.classList.add('in'); }, 350+i*130));

    // Confetti for delivered 🎉
    if(status==='delivered'){
      const colors=['#c9900a','#e8b84b','#f5d080','#c0536a','#f0d0d8','#2a8a56'];
      for(let i=0;i<18;i++){
        const c=document.createElement('div');
        c.className='conf';
        c.style.cssText=`left:${10+Math.random()*80}%;top:${10+Math.random()*30}%;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.6}s;animation-duration:${1.3+Math.random()*0.8}s;z-index:9999`;
        document.body.appendChild(c);
        setTimeout(()=>c.remove(), 2800);
      }
    }
  }));
}

// Auto-track from URL
const _qp = new URLSearchParams(location.search).get('order');
if(_qp){ document.getElementById('order-input').value=_qp.toUpperCase(); doSearch(); }
</script>
</body>
</html>
